<!DOCTYPE html>
<!-- Zeksa Language Website -->
<!-- Homepage -->
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>仄克萨 Zeksa</title>

<style>
  html, body {
    min-height: 100%;
  }

  :root {
    --accent: #0078D4;
    --text-color: #222;
    --label-color: #555;
    --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    --radius: 14px; 
  }

  #bg {
    position: fixed;
    top: 0;
    left: 0;
    height: 100dvh;
    width: 100dvw;
    z-index: -1; 
    pointer-events: none; 
  
    background:
      radial-gradient(
        circle at 20% 30%,
        rgba(214,236,255,0.8),
        transparent 40%
      ),
      radial-gradient(
        circle at 80% 20%,
        rgba(255,201,138,0.7),
        transparent 35%
      ),
      radial-gradient(
        circle at 60% 80%,
        rgba(234,246,255,0.7),
        transparent 45%
      ),
      linear-gradient(
        180deg,
        #eef8ff,
        #fff4e6
      );
  
    animation: drift 15s ease-in-out infinite alternate;
    background-size: 135% 135%;
  }

  html {
    min-height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI",
                 Roboto, "Helvetica Neue", Arial, sans-serif;
    max-width: 840px;
    margin: auto;
    padding: 2em;
  
    background: transparent; /* 原来是 var(--bg-color) */
    color: var(--text-color);
  }

  @keyframes drift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  h1 {
    text-align: center;
    color: var(--accent);
    font-size: 2.5rem;
  }

  p {
    text-align: center;
    margin-bottom: 0.5em;
  }

  hr {
    margin-bottom: 1em;
    margin-top: 0.25em;
  }

  small {
    display: block;
    text-align: center;
    margin-bottom: 0.5em;
  }

  input {
    width: 100%;
    max-width: 800px;
    padding: 14px 16px;
    font-size: 1.05rem;
    border: 1px solid #ccc;
    border-radius: var(--radius);
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    transition: border 0.3s;
    margin: 0 auto 24px auto;
    display: block;
    box-sizing: border-box;
  }

  input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,120,212,0.15);
  }

  .entry {
    background: rgba(255, 255, 255, 0.6);
  
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  
    padding: 15px 20px;
    margin: 30px auto;
    max-width: 800px;
  
    border-radius: 16px;
  
    box-shadow:
      0 8px 24px rgba(0,0,0,0.08),
      0 0 20px rgba(255,255,255,0.15);
  
    transition:
      transform 0.15s ease-out,
      box-shadow 0.2s ease;
  }
  
  .entry:hover {
    transform: translateY(-3px);
    box-shadow:
      0 14px 36px rgba(0,0,0,0.13),
      0 0 35px rgba(255,255,255,0.25);
  }

  .label {
    font-weight: bold;
    color: var(--label-color);
    display: inline-block;
    min-width: 5em;
  }

  .example {
    background: #eaf2fb;
    margin-top: 0.8em;
    padding: 12px 16px;
    border-radius: 10px;
    font-style: normal;
    color: #2c3e50;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  #results {
    display: none;
    max-width: 800px;
    margin: 0 auto;
  }

  .no-results {
    text-align: center;
    color: #999;
    font-style: italic;
  }

  button {
    display: block;
    margin: 20px auto;
    padding: 12px 24px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: white;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 12px rgba(0, 120, 212, 0.15);
  }
  
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0, 120, 212, 0.25);
    background: #0066b3;
  }
  
  button:active {
    transform: translateY(0px);
  }

  @media (max-width: 600px) {
    body {
      padding: 1em;
    }
    h1 {
      font-size: 1.8rem;
    }
  }

  @font-face {
    font-family: "ZeksaFont";
    src: url("./Zeksa 525.ttf") format("truetype");
  }

  .zeksa {
    font-family: "ZeksaFont", sans-serif;
  }

  .home-panel{
    max-width:700px;

    min-height:60vh;

    display:flex;
    flex-direction:column;

    justify-content:center;

    text-align:center;

    margin-top:10vh;
  }
  
  .logo{
      font-size:5rem;
      margin-bottom:.5rem;
  }
  
</style>
</head>

<body>
<div id="bg"></div>

<div class="entry home-panel">

<div class="zeksa logo">
    Alzomka
</div>

<h1>Zeksa</h1>

<p>
    Across deserts and storms,
    we remain connected.
</p>

<hr>

<p>
    Dictionary · World · Script
</p>

</div>
</body>
</html>
