<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zeksa</title>

<style>
html, body {
  min-height: 100%;
}

:root {
  --accent: #0078D4;
  --text-color: #222;
  --label-color: #555;
  --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
  --radius: 14px;
}

/* 背景 */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  height: 100dvh;
  width: 100dvw;
  z-index: -1;
  pointer-events: none;

  background:
    radial-gradient(circle at 20% 30%, rgba(214,236,255,0.8), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(255,201,138,0.7), transparent 35%),
    radial-gradient(circle at 60% 80%, rgba(234,246,255,0.7), transparent 45%),
    linear-gradient(180deg, #eef8ff, #fff4e6);

  animation: drift 15s ease-in-out infinite alternate;
  background-size: 135% 135%;
}

@keyframes drift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 全局 */
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI",
               Roboto, "Helvetica Neue", Arial, sans-serif;

  margin: 0;
  color: var(--text-color);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* 主面板（核心 entry） */
.entry {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  padding: 40px;
  border-radius: 16px;

  max-width: 700px;
  width: 90%;

  text-align: center;

  box-shadow:
    0 8px 24px rgba(0,0,0,0.08),
    0 0 20px rgba(255,255,255,0.15);
}

/* Zeksa 标题 */
.zeksa {
  font-family: "ZeksaFont", sans-serif;
}

.logo {
  font-size: 4.5rem;
  margin-bottom: 0.5rem;
  opacity: 0.9;
}

/* 标题 */
h1 {
  margin: 0;
  color: var(--accent);
  font-size: 2.5rem;
}

.subtitle {
  opacity: 0.75;
  margin-top: 10px;
  line-height: 1.6;
}

/* 输入框 */
input {
  width: 100%;
  padding: 14px 16px;
  font-size: 1rem;
  border-radius: var(--radius);
  border: 1px solid #ccc;
  margin-top: 20px;
}

/* 按钮（核心风格） */
button {
  display: block;
  margin: 20px auto;
  padding: 12px 24px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: white;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 12px rgba(0, 120, 212, 0.15);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0, 120, 212, 0.25);
  background: #0066b3;
}

button:active {
  transform: translateY(0px);
}

/* 今日词 */
.today-word {
  margin: 30px 0;
}

.today-word h2 {
  margin: 10px 0;
}

/* 导航按钮 */
.nav-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 16px;
}

.nav-buttons button {
  margin: 0;
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="entry">

    <div class="zeksa logo">
        Alzomka
    </div>

    <h1>Zeksa</h1>

    <p class="subtitle">
        Across deserts and storms,<br>
        we remain connected.
    </p>

    <input type="text" placeholder="Search vocabulary...">

    <div class="today-word">

        <small>Today's Word</small>

        <h2 class="zeksa">Alzomka</h2>

        <p><strong>People in connection</strong></p>

        <div class="example">
            Alzomka.<br>
            May our connection remain unbroken.
        </div>

    </div>

    <h2>Explore</h2>

    <div class="nav-buttons">

        <button onclick="location.href='dictionary.html'">
            Dictionary
        </button>

        <button onclick="location.href='omklon.html'">
            Omklon
        </button>

        <button onclick="location.href='script.html'">
            Script
        </button>

        <button onclick="location.href='calendar.html'">
            Calendar
        </button>

    </div>

</div>

</body>
</html>
