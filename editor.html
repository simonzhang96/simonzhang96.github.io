<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Zeksa Dictionary Editor</title>

<style>
:root{
  --accent:#0078D4;
  --radius:14px;
}

#bg {
      
  position: fixed;
  top: 0;
  left: 0;
  height: 100dvh;
  width: 100dvw;
  z-index: -1; 
  pointer-events: none; 

  background:
    radial-gradient(
      circle at 20% 30%,
      rgba(214,236,255,0.8),
      transparent 40%
    ),
    radial-gradient(
      circle at 80% 20%,
      rgba(255,201,138,0.7),
      transparent 35%
    ),
    radial-gradient(
      circle at 60% 80%,
      rgba(234,246,255,0.7),
      transparent 45%
    ),
    linear-gradient(
      180deg,
      #eef8ff,
      #fff4e6
    );

  animation: drift 15s ease-in-out infinite alternate;
  background-size: 135% 135%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  max-width:900px;
  margin:auto;
  padding:2em;
}

h1{
  text-align:center;
  color:var(--accent);
}

input, textarea{
  width:100%;
  padding:10px;
  margin:6px 0 12px;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  padding:12px 18px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

pre{
  background:#f4f4f4;
  padding:10px;
  border-radius:10px;
  overflow:auto;
}
</style>
</head>

<body>
<div id="bg"></div>

<h1>рҹ“ҳ Zeksa Dictionary Editor</h1>

<input id="token" placeholder="GitHub TokenпјҲйҰ–ж¬Ўиҫ“е…Ҙпјү">

<button onclick="saveToken()">дҝқеӯҳ Token</button>
<button onclick="loadDict()">еҠ иҪҪ dict.json</button>

<hr>

<h3>ж–°еўһиҜҚжқЎ</h3>

<input id="word" placeholder="word">
<input id="meaning" placeholder="meaning">
<input id="gloss" placeholder="gloss">
<input id="pos" placeholder="pos">
<input id="root" placeholder="root">
<input id="affix" placeholder="affix">

<h4>Example</h4>
<input id="zeksa" placeholder="zeksa sentence">
<input id="translation" placeholder="translation">

<button onclick="addWord()">ж·»еҠ е№¶жҸҗдәӨ</button>

<pre id="out">зӯүеҫ…ж“ҚдҪң...</pre>

<script>

let dict = [];

const OWNER = "simonzhang96";
const REPO = "simonzhang96.github.io";
const PATH = "dict.json";

/* ===== д»„е…ӢиҗЁеӯ—жҜҚиЎЁ ===== */
const ALPHABET = [
"a","ГЎ","e","Г©","i","Гӯ",
"o","Гі","u","Гә",
"ГӨ","Гў","Г«","ГӘ","Гё","Гҙ",
"b","p",
"d","t",
"g","k",
"m","n",
"q",
"v","f",
"z","s",
"j","c",
"x",
"ts",
"h","Д§",
"l","r",
"w","y"
];

const ORDER = {};
ALPHABET.forEach((c,i)=>ORDER[c]=i);

/* ===== Token ===== */
function tokenize(word){
  word = word.toLowerCase();
  let res = [];
  for(let i=0;i<word.length;i++){
    if(word.slice(i,i+2)==="ts"){
      res.push("ts");
      i++;
    }else{
      res.push(word[i]);
    }
  }
  return res;
}

/* ===== жҺ’еәҸ ===== */
function compare(a,b){
  const w1 = tokenize(a.word);
  const w2 = tokenize(b.word);

  const len = Math.max(w1.length,w2.length);

  for(let i=0;i<len;i++){
    const p1 = ORDER[w1[i]] ?? 999;
    const p2 = ORDER[w2[i]] ?? 999;
    if(p1!==p2) return p1-p2;
  }
  return 0;
}

/* ===== Token ===== */
function saveToken(){
  localStorage.setItem("gh_token",document.getElementById("token").value);
  alert("е·Ідҝқеӯҳ");
}

function getToken(){
  return localStorage.getItem("gh_token");
}

/* ===== еҠ иҪҪ dict ===== */
async function loadDict(){

  const token = getToken();

  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
    {
      headers:{
        Authorization:`Bearer ${token}`
      }
    }
  );

  const data = await res.json();

  const binary = atob(data.content);
  
  const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
  
  const decoded = new TextDecoder("utf-8").decode(bytes);
  
  const dict = JSON.parse(decoded);

  dict = JSON.parse(content);

  document.getElementById("out").innerText =
    "е·ІеҠ иҪҪиҜҚжқЎпјҡ" + dict.length;
}

/* ===== ж·»еҠ иҜҚжқЎ ===== */
async function addWord(){

  const token = getToken();

  if(!token){
    alert("е…Ҳиҫ“е…Ҙ Token");
    return;
  }

  const newEntry = {
    word: document.getElementById("word").value.trim().toLowerCase(),
    meaning: document.getElementById("meaning").value.trim(),
    gloss: document.getElementById("gloss").value.trim(),
    pos: document.getElementById("pos").value.trim(),
    root: document.getElementById("root").value.trim(),
    affix: document.getElementById("affix").value.trim(),
    examples: [
      {
        zeksa: document.getElementById("zeksa").value.trim(),
        translation: document.getElementById("translation").value.trim()
      }
    ]
  };

  /* ===== еҺ»йҮҚ ===== */
  if(dict.some(x=>x.word===newEntry.word)){
    alert("иҜҚжқЎе·ІеӯҳеңЁ");
    return;
  }

  dict.push(newEntry);
  dict.sort(compare);

  /* ===== иҺ·еҸ– SHA ===== */
  const fileRes = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
    {
      headers:{
        Authorization:`Bearer ${token}`
      }
    }
  );

  const fileData = await fileRes.json();

  const sha = fileData.sha;

  /* ===== зј–з Ғ ===== */
  const content = btoa(
    unescape(
      encodeURIComponent(
        JSON.stringify(dict,null,2)
      )
    )
  );

  /* ===== жҸҗдәӨ ===== */
  const commit = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
    {
      method:"PUT",
      headers:{
        Authorization:`Bearer ${token}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:`Add word ${newEntry.word}`,
        content,
        sha
      })
    }
  );

  const result = await commit.json();

  document.getElementById("out").innerText =
    "жҸҗдәӨжҲҗеҠҹпјҡ" + newEntry.word;

  console.log(result);
}

</script>

</body>
</html>
