<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Zeksa Dictionary Editor</title>

<style>
:root {
  --accent: #0078D4;
  --radius: 14px;
  --shadow: 0 2px 10px rgba(0,0,0,0.08);
}

#bg {
  position: fixed;
  top: 0;
  left: 0;
  height: 100dvh;
  width: 100dvw;
  z-index: -1;
  pointer-events: none;

  background:
    radial-gradient(circle at 20% 30%, rgba(214,236,255,0.8), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(255,201,138,0.7), transparent 35%),
    radial-gradient(circle at 60% 80%, rgba(234,246,255,0.7), transparent 45%),
    linear-gradient(180deg, #eef8ff, #fff4e6);

  animation: drift 15s ease-in-out infinite alternate;
  background-size: 135% 135%;
}

@keyframes drift {
  0% { background-position: 0% 0%; }
  100% { background-position: 100% 100%; }
}

* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 2em;
  position: relative;
}

h1 {
  text-align: center;
  color: var(--accent);
  margin-bottom: 30px;
}

h3, h4 {
  margin-top: 24px;
  color: #333;
}

input {
  width: 100%;
  padding: 12px 14px;
  margin: 6px 0 14px;
  border: 1px solid #ddd;
  border-radius: var(--radius);
  font-size: 15px;
  transition: border 0.2s;
}

input:focus {
  outline: none;
  border-color: var(--accent);
}

button {
  padding: 12px 20px;
  margin: 8px 6px 12px 0;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.2s;
}

button:hover {
  opacity: 0.9;
}

button:active {
  transform: scale(0.98);
}

button:disabled {
  background: #94b8e0;
  cursor: not-allowed;
  opacity: 0.7;
  transform: none;
}

hr {
  border: none;
  height: 1px;
  background: #eee;
  margin: 26px 0;
}

pre {
  background: #f9f9f9;
  padding: 16px;
  border-radius: var(--radius);
  overflow: auto;
  max-height: 280px;
  box-shadow: var(--shadow);
  white-space: pre-wrap;
}

.card {
  background: white;
  padding: 22px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
</style>
</head>

<body>
<div id="bg"></div>

<h1>📘 Zeksa 词典编辑器</h1>

<div class="card">
  <input id="token" type="password" placeholder="GitHub Token（已隐藏）">
  <button id="btnSaveToken" onclick="saveToken()">💾 保存 Token</button>
  <button id="btnLoad" onclick="loadDict()">📥 加载 dict.json</button>
</div>

<hr>

<div class="card">
  <h3>新增词条</h3>
  <input id="word" placeholder="word（单词）">
  <input id="meaning" placeholder="meaning（释义）">
  <input id="gloss" placeholder="gloss（注解）">
  <input id="pos" placeholder="pos（词性）">
  <input id="root" placeholder="root（词根）">
  <input id="affix" placeholder="affix（词缀）">

  <h4>例句 Example</h4>
  <input id="zeksa" placeholder="zeksa sentence（原语例句）">
  <input id="translation" placeholder="translation（中文翻译）">

  <button id="btnAdd" onclick="addWord()">✅ 添加并提交到 GitHub</button>
</div>

<pre id="out">等待操作...</pre>

<script>
let dict = [];
let isLoading = false;

const OWNER = "simonzhang96";
const REPO = "simonzhang96.github.io";
const PATH = "dict.json";

const ALPHABET = [
  "a","á","e","é","i","í",
  "o","ó","u","ú",
  "ä","â","ë","ê","ø","ô",
  "b","p","d","t","g","k",
  "m","n","q","v","f","z","s",
  "j","c","x","ts","h","ħ",
  "l","r","w","y"
];
const ORDER = {};
ALPHABET.forEach((c, i) => ORDER[c] = i);

function tokenize(word) {
  word = word.toLowerCase();
  let res = [];
  for (let i = 0; i < word.length; i++) {
    if (word.slice(i, i + 2) === "ts") {
      res.push("ts");
      i++;
    } else {
      res.push(word[i]);
    }
  }
  return res;
}

function compare(a, b) {
  const w1 = tokenize(a.word);
  const w2 = tokenize(b.word);
  const len = Math.max(w1.length, w2.length);
  for (let i = 0; i < len; i++) {
    const p1 = ORDER[w1[i]] ?? 999;
    const p2 = ORDER[w2[i]] ?? 999;
    if (p1 !== p2) return p1 - p2;
  }
  return 0;
}

function utf8ToBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function base64ToUtf8(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\s/g, ''))));
}

function saveToken() {
  const t = document.getElementById("token").value.trim();
  if (!t) { alert("请输入 GitHub Token"); return; }
  localStorage.setItem("gh_token", t);
  alert("✅ Token 已保存");
}
function getToken() {
  return localStorage.getItem("gh_token") || "";
}

// 加载词典（已改为 token 授权）
async function loadDict() {
  if (isLoading) return;
  const token = getToken();
  if (!token) { alert("请先输入并保存 Token"); return; }

  isLoading = true;
  const btn = document.getElementById("btnLoad");
  btn.disabled = true;
  document.getElementById("out").innerText = "正在加载...";

  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      headers: { 
        // 修复：改用 token 前缀，不再用 Bearer
        Authorization: `token ${token}` 
      }
    });

    if (!res.ok) throw new Error(`请求失败 ${res.status}`);
    const data = await res.json();
    const raw = base64ToUtf8(data.content);
    dict = JSON.parse(raw);

    document.getElementById("out").innerText = `✅ 加载完成，共 ${dict.length} 条词条`;
  } catch (err) {
    document.getElementById("out").innerText = `❌ 加载失败：${err.message}`;
    console.error(err);
  } finally {
    isLoading = false;
    btn.disabled = false;
  }
}

// 提交词条（已改为 token 授权）
async function addWord() {
  if (isLoading) return;
  if (!Array.isArray(dict)) { alert("请先加载词典文件"); return; }

  const token = getToken();
  if (!token) { alert("请先保存 Token"); return; }

  const getVal = id => document.getElementById(id).value.trim();
  const wordVal = getVal("word").toLowerCase();

  if (!wordVal) { alert("单词不能为空"); return; }
  if (dict.some(item => item.word === wordVal)) { alert("⚠️ 该词条已存在"); return; }

  const newEntry = {
    word: wordVal,
    meaning: getVal("meaning"),
    gloss: getVal("gloss"),
    pos: getVal("pos"),
    root: getVal("root"),
    affix: getVal("affix"),
    examples: [{
      zeksa: getVal("zeksa"),
      translation: getVal("translation")
    }]
  };

  dict.push(newEntry);
  dict.sort(compare);

  isLoading = true;
  const btn = document.getElementById("btnAdd");
  btn.disabled = true;
  document.getElementById("out").innerText = "正在提交...";

  try {
    const fileRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!fileRes.ok) throw new Error("获取文件信息失败");
    const fileData = await fileRes.json();
    const sha = fileData.sha;

    const jsonStr = JSON.stringify(dict, null, 2);
    const content = utf8ToBase64(jsonStr);

    const commitRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      method: "PUT",
      headers: {
        Authorization: `token ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: `Add word: ${newEntry.word}`,
        content,
        sha
      })
    });

    if (!commitRes.ok) throw new Error("提交到 GitHub 失败");
    document.getElementById("out").innerText = `✅ 提交成功：${newEntry.word}\n当前总计：${dict.length} 条`;

    document.querySelectorAll("input:not(#token)").forEach(el => el.value = "");
  } catch (err) {
    document.getElementById("out").innerText = `❌ 提交失败：${err.message}`;
    console.error(err);
  } finally {
    isLoading = false;
    btn.disabled = false;
  }
}

window.onload = () => {
  const token = getToken();
  if (token) {
    document.getElementById("token").value = token;
  }
};
</script>

</body>
</html>
