<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Zeksa Dictionary Editor</title>

<style>
:root{
  --accent:#0078D4;
  --radius:14px;
}

#bg {
  position: fixed;
  top: 0;
  left: 0;
  height: 100dvh;
  width: 100dvw;
  z-index: -1; 
  pointer-events: none; 

  background:
    radial-gradient(
      circle at 20% 30%,
      rgba(214,236,255,0.8),
      transparent 40%
    ),
    radial-gradient(
      circle at 80% 20%,
      rgba(255,201,138,0.7),
      transparent 35%
    ),
    radial-gradient(
      circle at 60% 80%,
      rgba(234,246,255,0.7),
      transparent 45%
    ),
    linear-gradient(
      180deg,
      #eef8ff,
      #fff4e6
    );

  animation: drift 15s ease-in-out infinite alternate;
  background-size: 135% 135%;
}

@keyframes drift {
  0% { background-position: 0% 0%; }
  100% { background-position: 100% 100%; }
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  max-width:900px;
  margin:auto;
  padding:2em;
}

h1{
  text-align:center;
  color:var(--accent);
}

input, textarea{
  width:100%;
  padding:10px;
  margin:6px 0 12px;
  border:1px solid #ccc;
  border-radius:10px;
  box-sizing: border-box;
}

button{
  padding:12px 18px;
  margin:10px 5px 10px 0;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

pre{
  background:#f4f4f4;
  padding:10px;
  border-radius:10px;
  overflow:auto;
  min-height: 40px;
}
</style>
</head>

<body>
<div id="bg"></div>

<h1>📘 Zeksa Dictionary Editor</h1>

<input id="token" placeholder="GitHub Token（首次输入）">

<button onclick="saveToken()">保存 Token</button>
<button onclick="loadDict()">加载 dict.json</button>

<hr>

<h3>新增词条</h3>

<input id="word" placeholder="word（必填）">
<input id="meaning" placeholder="meaning">
<input id="gloss" placeholder="gloss">
<input id="pos" placeholder="pos">
<input id="root" placeholder="root">
<input id="affix" placeholder="affix">

<h4>Example</h4>
<input id="zeksa" placeholder="zeksa sentence">
<input id="translation" placeholder="translation">

<button onclick="addWord()">添加并提交</button>

<pre id="out">等待操作...</pre>

<script>
let dict = [];

// 配置你的 GitHub 信息
const OWNER = "simonzhang96";
const REPO = "simonzhang96.github.io";
const PATH = "dict.json";

/* ===== 仄克萨字母表 ===== */
const ALPHABET = [
"a","á","e","é","i","í",
"o","ó","u","ú",
"ä","â","ë","ê","ø","ô",
"b","p",
"d","t",
"g","k",
"m","n",
"q",
"v","f",
"z","s",
"j","c",
"x",
"ts",
"h","ħ",
"l","r",
"w","y"
];

const ORDER = {};
ALPHABET.forEach((c,i) => ORDER[c] = i);

/* ===== 分词（支持 ts 双字母） ===== */
function tokenize(word){
  word = word.toLowerCase();
  let res = [];
  for(let i=0; i<word.length; i++){
    if(word.slice(i, i+2) === "ts"){
      res.push("ts");
      i++;
    } else {
      res.push(word[i]);
    }
  }
  return res;
}

/* ===== 自定义词典排序 ===== */
function compare(a,b){
  const w1 = tokenize(a.word);
  const w2 = tokenize(b.word);
  const len = Math.max(w1.length, w2.length);

  for(let i=0; i<len; i++){
    const p1 = ORDER[w1[i]] ?? 999;
    const p2 = ORDER[w2[i]] ?? 999;
    if(p1 !== p2) return p1 - p2;
  }
  return 0;
}

/* ===== Token 存储 ===== */
function saveToken(){
  const val = document.getElementById("token").value.trim();
  if (!val) { alert("请输入 Token"); return; }
  localStorage.setItem("gh_token", val);
  alert("Token 已保存");
}

function getToken(){
  return localStorage.getItem("gh_token") || "";
}

/* ===== 加载远程 dict.json ===== */
async function loadDict(){
  const token = getToken();
  if(!token){
    alert("请先输入并保存 GitHub Token");
    return;
  }

  try {
    const res = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );

    if (!res.ok) throw new Error(`API 错误：${res.status}`);
    
    const data = await res.json();
    const content = atob(data.content.replace(/\n/g, ''));
    dict = JSON.parse(content);
    
    document.getElementById("out").innerText = `✅ 已加载 ${dict.length} 条词条`;
  } catch (err) {
    document.getElementById("out").innerText = `❌ 加载失败：${err.message}`;
    console.error(err);
  }
}
  
/* ===== 添加并提交词条 ===== */
async function addWord(){
  // 校验
  if (!Array.isArray(dict)) {
    alert("请先加载词典！");
    return;
  }

  const wordInput = document.getElementById("word").value.trim();
  if (!wordInput) {
    alert("word 不能为空！");
    return;
  }

  const token = getToken();
  if (!token) {
    alert("请先保存 GitHub Token");
    return;
  }

  // 构造新词条
  const newEntry = {
    word: wordInput.toLowerCase(),
    meaning: document.getElementById("meaning").value.trim(),
    gloss: document.getElementById("gloss").value.trim(),
    pos: document.getElementById("pos").value.trim(),
    root: document.getElementById("root").value.trim(),
    affix: document.getElementById("affix").value.trim(),
    examples: [
      {
        zeksa: document.getElementById("zeksa").value.trim(),
        translation: document.getElementById("translation").value.trim()
      }
    ]
  };

  // 去重
  if (dict.some(x => x.word === newEntry.word)) {
    alert(`⚠️ 词条【${newEntry.word}】已存在`);
    return;
  }

  // 加入并排序
  dict.push(newEntry);
  dict.sort(compare);

  try {
    document.getElementById("out").innerText = "⌛ 正在提交到 GitHub...";

    // 1. 获取当前文件 SHA
    const fileRes = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const fileData = await fileRes.json();
    const sha = fileData.sha;

    // 2. 编码 JSON
    const jsonStr = JSON.stringify(dict, null, 2);
    const utf8Bytes = new TextEncoder().encode(jsonStr);
    const base64Content = btoa(String.fromCharCode(...utf8Bytes));

    // 3. 提交更新
    const commitRes = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
      {
        method: "PUT",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: `Add word: ${newEntry.word}`,
          content: base64Content,
          sha: sha
        })
      }
    );

    if (!commitRes.ok) throw new Error(`提交失败 ${commitRes.status}`);

    // 成功
    document.getElementById("out").innerText = `✅ 提交成功：${newEntry.word}\n词典总数：${dict.length}`;
    
    // 清空输入框
    document.querySelectorAll("input").forEach(inp => {
      if (inp.id !== "token") inp.value = "";
    });

  } catch (err) {
    document.getElementById("out").innerText = `❌ 提交失败：${err.message}`;
    console.error(err);
  }
}

// 页面加载时自动填充 Token
window.onload = () => {
  const token = getToken();
  if (token) {
    document.getElementById("token").value = token;
  }
};
</script>

</body>
</html>
