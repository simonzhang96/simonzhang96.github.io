<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仄克萨语单词练习</title>

<style>
:root {
  --bg: #f5f7fa;
  --card: #ffffff;
  --accent: #0078D4;
  --correct: #2ecc71;
  --wrong: #e74c3c;
  --pending: #bbb;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  text-align: center;
  padding: 2em;
}

h1 {
  color: var(--accent);
}

#wordDisplay {
  font-size: 2rem;
  margin: 30px auto;
  padding: 20px;
  background: var(--card);
  border-radius: 12px;
  max-width: 600px;
}

.correct { color: var(--correct); }
.wrong { color: var(--wrong); }
.pending { color: var(--pending); }

input {
  width: 80%;
  max-width: 600px;
  padding: 14px;
  font-size: 1.2rem;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#meaning {
  margin-top: 10px;
  color: #666;
}

button {
  margin-top: 20px;
  padding: 10px 18px;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

@font-face {
  font-family: "ZeksaFont";
  src: url("./Zeksa 525.ttf") format("truetype");
}

.zeksa {
  font-family: "ZeksaFont", sans-serif;
}
</style>
</head>

<body>

<h1>仄克萨语 · 单词连接</h1>

<div id="wordDisplay" class="zeksa"></div>

<input id="inputBox" placeholder="输入单词..." autofocus />

<div id="meaning"></div>

<button onclick="nextWord()">下一个</button>

<script>
let dict = [];
let currentWord = "";

const display = document.getElementById("wordDisplay");
const input = document.getElementById("inputBox");
const meaning = document.getElementById("meaning");

// ===== 加载 JSON =====
fetch("dict.json")
  .then(res => res.json())
  .then(data => {
    dict = data;
    nextWord();
  });

// ===== 随机单词 =====
function nextWord() {
  const entry = dict[Math.floor(Math.random() * dict.length)];
  currentWord = entry.word;

  display.innerHTML = "";
  input.value = "";
  meaning.innerText = entry.meaning || "";

  render();
}

// ===== 渲染高亮 =====
function render() {
  display.innerHTML = "";

  for (let i = 0; i < currentWord.length; i++) {
    const span = document.createElement("span");
    span.innerText = currentWord[i];

    if (i < input.value.length) {
      if (input.value[i] === currentWord[i]) {
        span.className = "correct";
      } else {
        span.className = "wrong";
      }
    } else {
      span.className = "pending";
    }

    display.appendChild(span);
  }
}

// ===== 输入监听 =====
input.addEventListener("input", () => {
  render();

  if (input.value === currentWord) {
    setTimeout(nextWord, 300);
  }
});
</script>

</body>
</html>
