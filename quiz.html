<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仄克萨语词汇测试</title>

<style>
:root {
  --bg-color: #f5f7fa;
  --card-bg: #ffffff;
  --accent: #0078D4;
  --text-color: #222;
  --label-color: #555;
  --shadow: 0 8px 20px rgba(0,0,0,0.05);
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  max-width: 840px;
  margin: auto;
  padding: 2em;
  background: var(--bg-color);
  color: var(--text-color);
}

h1 {
  text-align: center;
  color: var(--accent);
  font-size: 2.5rem;
}

p {
  text-align: center;
}

small {
  display: block;
  text-align: center;
  margin-bottom: 0.5em;
}

.entry {
  background: var(--card-bg);
  padding: 20px;
  margin: 30px auto;
  max-width: 800px;
  border-radius: 16px;
  box-shadow: var(--shadow);
}

.word {
  font-size: 1.8rem;
  text-align: center;
  margin-bottom: 20px;
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.option {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: white;
  transition: all 0.2s;
}

.option:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.correct {
  background: #dff5e4;
  border-color: #2ecc71;
}

.wrong {
  background: #ffe4e4;
  border-color: #e74c3c;
}

#result {
  text-align: center;
  margin-top: 20px;
  font-weight: bold;
}

button {
  display: block;
  margin: 20px auto;
  padding: 10px 18px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: white;
  font-size: 1rem;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.example {
  background: #eaf2fb;
  margin-top: 16px;
  padding: 12px;
  border-radius: 10px;
}

@font-face {
  font-family: "ZeksaFont";
  src: url("./Zeksa 525.ttf") format("truetype");
}

.zeksa {
  font-family: "ZeksaFont", sans-serif;
}
</style>

</head>

<body>

<h1>仄克萨语词汇测试</h1>
<hr>
<p>选择正确的词义。</p>
<button onclick="toggleZeksa()" style="display:block; margin:1em auto;">拉丁 - 仄克萨字母</button>

<div class="entry">

<div class="word" id="word">加载中...</div>

<div class="options" id="options"></div>

<div id="result"></div>

<button onclick="nextQuestion()">下一题</button>

<div id="example"></div>

</div>

<script>
let useZeksa = true;

const zeksaMap = {
  "a": "\uE001",
  "á": "\uE002",
  "e": "\uE003",
  "é": "\uE004",
  "i": "\uE005",
  "í": "\uE006",
  "o": "\uE007",
  "ó": "\uE008",
  "u": "\uE009",
  "ú": "\uE00A",
  "ä": "\uE00B",
  "â": "\uE00C",
  "ë": "\uE00D",
  "ê": "\uE00E",
  "ø": "\uE00F",
  "ô": "\uE010",
  "b": "\uE011",
  "p": "\uE012",
  "d": "\uE013",
  "t": "\uE014",
  "g": "\uE015",
  "k": "\uE016",
  "m": "\uE017",
  "n": "\uE018",
  "q": "\uE019",
  "v": "\uE01A",
  "f": "\uE01B",
  "z": "\uE01C",
  "s": "\uE01D",
  "j": "\uE01E",
  "c": "\uE01F",
  "x": "\uE020",
  "ts": "\uE021",
  "h": "\uE022",
  "ħ": "\uE023",
  "l": "\uE024",
  "r": "\uE025",
  "w": "\uE026",
  "y": "\uE027",
  "0": "\uE029",
  "1": "\uE02A",
  "2": "\uE02B",
  "3": "\uE02C",
  ",": "\uE032",
  ".": "\uE033",
  "'": "\uE034",
  '"': "\uE035",
  "!": "\uE036",
  "?": "\uE037",
  "/": "\uE038"
};

function toZeksa(text) {
  let result = "";
  let i = 0;

  while (i < text.length) {
    // 优先匹配双字母
    const twoChar = text.slice(i, i + 2);
    if (zeksaMap[twoChar]) {
      result += zeksaMap[twoChar];
      i += 2;
      continue;
    }

    const oneChar = text[i];
    result += zeksaMap[oneChar] || oneChar;
    i += 1;
  }
  return result;
}

function toggleZeksa() {
  useZeksa = !useZeksa;
  renderCurrentQuestion();
}

let dictionary=[]
let answer=""
let currentEntry=null

async function loadDictionary(){
  const response=await fetch("dict.json")
  dictionary=await response.json()
  nextQuestion()
}

function nextQuestion(){

  document.getElementById("result").innerText=""
  document.getElementById("example").innerHTML=""

  const randomWord=dictionary[Math.floor(Math.random()*dictionary.length)]
  currentEntry=randomWord
  answer=randomWord.meaning

  document.getElementById("word").innerText = useZeksa ? toZeksa(randomWord.word) : randomWord.word;
  if(useZeksa){
    document.getElementById("word").classList.add("zeksa");
  } else {
    document.getElementById("word").classList.remove("zeksa");
  }

  let options=[randomWord.meaning]

  while(options.length<4){
    const wrong=dictionary[Math.floor(Math.random()*dictionary.length)].meaning
    if(!options.includes(wrong)){
      options.push(wrong)
    }
  }

  options.sort(()=>Math.random()-0.5)

  const container=document.getElementById("options")
  container.innerHTML=""

  options.forEach(opt=>{
    const div=document.createElement("div")
    div.className="option"
    div.innerText=opt

    div.onclick=()=>checkAnswer(div,opt)

    container.appendChild(div)
  })
}

function checkAnswer(element,choice){

  const options=document.querySelectorAll(".option")

  options.forEach(o=>o.onclick=null)

  if(choice===answer){
    element.classList.add("correct")
    document.getElementById("result").innerText="✅ 正确！"
  }else{
    element.classList.add("wrong")

    // 找到正确答案并高亮
    options.forEach(o=>{
      if(o.innerText===answer){
        o.classList.add("correct")
      }
    })

    document.getElementById("result").innerText="❌ 错误！正确答案是： "+answer
  }

  showExample()
}

function showExample(){
  if(!currentEntry.examples) return;

  const html=currentEntry.examples.map(ex=>`
  <div class="example ${useZeksa ? "zeksa" : ""}">
    <strong>例句:</strong> ${useZeksa ? toZeksa(ex.zeksa) : ex.zeksa}<br>
    <strong>翻译:</strong> ${ex.translation}
  </div>
  `).join("");

  document.getElementById("example").innerHTML = html;
}

loadDictionary()

</script>
<img src="zeksa dict website.png" style="display: block; max-width: 100%; height: auto; margin: 1em auto;">  
<small>A Dictionary of the Zeksa Language, Created by Simon Zhang.</small>

</body>
</html>
