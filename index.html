<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>仄克萨语词典</title>
  <style>
    :root {
      --bg-color: #f5f7fa;
      --card-bg: #ffffff;
      --accent: #0078D4;
      --text-color: #222;
      --label-color: #555;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      max-width: 840px;
      margin: auto;
      padding: 2em;
      background: var(--bg-color);
      color: var(--text-color);
    }

    h1 {
      text-align: center;
      color: var(--accent);
      font-size: 2.5rem;
    }

    p {
      text-align: center;
      margin-bottom: 0.5em;
    }

    hr {
      margin-bottom: 1em;
      margin-top: 0.25em;
    }

    small {
      display: block;
      text-align: center;
      margin-bottom: 0.5em;
    }

    input {
      width: 100%;
      max-width: 800px;
      padding: 14px 16px;
      font-size: 1.05rem;
      border: 1px solid #ccc;
      border-radius: var(--radius);
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      transition: border 0.3s;
      margin: 0 auto 24px auto;
      display: block;
    }

    input:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,120,212,0.15);
    }

    .entry {
      background: var(--card-bg);
      padding: 15px 20px;
      margin: 30px auto;
      max-width: 800px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .entry:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }

    .label {
      font-weight: bold;
      color: var(--label-color);
      display: inline-block;
      min-width: 5em;
    }

    .example {
      background: #eaf2fb;
      margin-top: 0.8em;
      padding: 12px 16px;
      border-radius: 10px;
      font-style: normal;
      color: #2c3e50;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    #results {
      display: none;
      max-width: 800px;
      margin: 0 auto;
    }

    .no-results {
      text-align: center;
      color: #999;
      font-style: italic;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      body {
        padding: 1em;
      }
      h1 {
        font-size: 1.8rem;
      }
    }

    @font-face {
      font-family: "ZeksaFont";
      src: url("./Zeksa 525.ttf") format("truetype");
    }

    .zeksa {
      font-family: "ZeksaFont", sans-serif;
    }
  </style>
</head>
<body>
  <h1>仄克萨语词典</h1>
  <p>在搜索框里输入中文或者仄克萨语，以查询该词的完整信息。</p>
  <p id="word-count" style="text-align: center; font-weight: bold; margin-top: 1em;">
  本网站已收录 <span id="count-number">0</span> 个仄克萨语词汇。</p>
  <button onclick="toggleZeksa()" style="display:block; margin:1em auto;">拉丁 - 仄克萨字母</button>
  <div id="daily-word" class="entry" style="text-align:center;">
  <h2 style="color: var(--accent); margin-top:0;">今日单词</h2>
  <div id="daily-content">加载中...</div>
  </div>
  <hr>
  <input type="text" id="searchBox" placeholder="搜索单词或词义..." oninput="search()">
  <div id="results">加载中...</div>

  <script>
    let useZeksa = false;
    const zeksaMap = {
      "a": "\uE001",
      "á": "\uE002",
      "e": "\uE003",
      "é": "\uE004",
      "i": "\uE005",
      "í": "\uE006",
      "o": "\uE007",
      "ó": "\uE008",
      "u": "\uE009",
      "ú": "\uE00A",
      "ä": "\uE00B",
      "â": "\uE00C",
      "ë": "\uE00D",
      "ê": "\uE00E",
      "ø": "\uE00F",
      "ô": "\uE010",
      "b": "\uE011",
      "p": "\uE012",
      "d": "\uE013",
      "t": "\uE014",
      "g": "\uE015",
      "k": "\uE016",
      "m": "\uE017",
      "n": "\uE018",
      "q": "\uE019",
      "v": "\uE01A",
      "f": "\uE01B",
      "z": "\uE01C",
      "s": "\uE01D",
      "j": "\uE01E",
      "c": "\uE01F",
      "x": "\uE020",
      "ts": "\uE021",
      "h": "\uE022",
      "ħ": "\uE023",
      "l": "\uE024",
      "r": "\uE025",
      "w": "\uE026",
      "y": "\uE027",
      //THERE'S NO U+E028!!!
      "0": "\uE029",
      "1": "\uE02A",
      "2": "\uE02B",
      "3": "\uE02C",
      //U+E024 ~ U+E031 DISQUALIFIED
      ",": "\uE032",
      ".": "\uE033",
      "'": "\uE034",
      '"': "\uE035",
      "!": "\uE036",
      "?": "\uE037",
      "/": "\uE038"
      //U+E039 ~ E03B DISQUALIFIED
    }

    function toggleZeksa() {
      useZeksa = !useZeksa;
      document.getElementById("searchBox").value = useZeksa ? toZeksa(document.getElementById("searchBox").value) : document.getElementById("searchBox").value
      showDailyWord();
      search();
    }

    function toZeksa(text) {
      let result = "";
      let i = 0;
    
      while (i < text.length) {
        // 优先匹配双字母
        const twoChar = text.slice(i, i + 2);
    
        if (zeksaMap[twoChar]) {
          result += zeksaMap[twoChar];
          i += 2;
          continue;
        }
    
        // 单字母 fallback
        const oneChar = text[i];
    
        result += zeksaMap[oneChar] || oneChar;
        i += 1;
      }
    
      return result;
    }
    
    let dictionary = [];

    async function loadDictionary() {
      const response = await fetch("dict.json");
      dictionary = await response.json();
    
      document.getElementById("count-number").textContent = dictionary.length;
      showDailyWord();
      search(); 
    }

    function search() {
      let query = document.getElementById("searchBox").value.trim().toLowerCase();
      if (useZeksa) {
        query = toZeksa(query);
      }
      const results = dictionary.filter(entry => {

        const word = useZeksa ? toZeksa(entry.word.toLowerCase()) : entry.word.toLowerCase()
      
        return (
          word.startsWith(query) ||
          entry.meaning.toLowerCase().includes(query)
        )

      });

      const output = document.getElementById("results");

      if (!query) {
        output.innerHTML = "";
        output.style.display = "none";
        return;
      }

      if (results.length === 0) {
        output.innerHTML = `<div class="no-results">未找到匹配的词条</div>`;
        output.style.display = "block";
        return;
      }

      output.innerHTML = results.map(entry => renderEntry(entry)).join('');
      output.style.display = "block";
    }

    function showDailyWord() {

      const today = new Date()
    
      const seed =
        today.getFullYear() * 10000 +
        (today.getMonth()+1) * 100 +
        today.getDate()
    
      const index = seed % dictionary.length
    
      const word = dictionary[index]
    
      const html = `
        <div class="${useZeksa ? "zeksa" : ""}">
          <div style="font-size:1.5rem; margin-bottom:8px;">
            <strong>${useZeksa ? toZeksa(word.word) : word.word}</strong>
          </div>
          <div>${word.meaning}</div>
          <div style="color:#666; font-size:0.95rem;">${word.pos}</div>
          ${word.examples?.[0] ? `
            <div class="example">
              <strong>例句:</strong> ${useZeksa ? toZeksa(word.examples[0].zeksa) : word.examples[0].zeksa}<br>
              <strong>翻译:</strong> ${word.examples[0].translation}
            </div>
          ` : ""}
        </div>
      `;

      document.getElementById("daily-content").innerHTML = html
    }

    function renderEntry(entry) {
      return `
        <div class="entry ${useZeksa ? "zeksa" : ""}">
          <div><span class="label">词语:</span> ${useZeksa ? toZeksa(entry.word) : entry.word}</div>
          <div><span class="label">词义:</span> ${entry.meaning}</div>
          <div><span class="label">词类:</span> ${entry.pos}</div>
          <div><span class="label">构词类型:</span> ${entry.root}</div>
          <div><span class="label">词缀体:</span> ${entry.affix}</div>
          <div><span class="label">语法注解:</span> ${entry.gloss}</div>
          ${entry.examples.map(ex => `
            <div class="example">
              <strong>例句:</strong> ${useZeksa ? toZeksa(ex.zeksa) : ex.zeksa}<br>
              <strong>翻译:</strong> ${ex.translation}
            </div>
          `).join('')}
        </div>
      `;
    }

    loadDictionary();
  </script>
  <p style="text-align:center;">
  <a href="quiz.html">进入词汇测试</a>
  </p>
  <img src="./zeksa dict website.png" style="display: block; max-width: 100%; height: auto; margin: 1em auto;">
  <small>A Dictionary of the Zeksa Language, Created by Simon Zhang.</small>
</body>
</html>
